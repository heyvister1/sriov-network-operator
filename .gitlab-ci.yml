include:
  - component: $CI_SERVER_FQDN/security/devops-tools/ci-cd-components/pulse-container-scanner/scan-image@~latest
    inputs:
      job_prefix: pulse-scan-oss
      nspect_id: $NSPECT_ID
      container_image: $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG
      enable_override: true
      program_version: $NSPECT_RELEASE_VERSION
      stage: pulse-scan-oss
      tags: [os/linux, type/docker]
      rules:
        - if: '$CI_COMMIT_TAG =~ /^network-operator-.*$/'
      allow_failure_exit_code: [11, 255]
      track_usage: "false"

stages:
  - build
  - pulse-scan-oss
  - pulse-scan-stig
  - deploy

variables:  # additional variables are defined at the gitlab group scope
  DOCKERFILE: Dockerfile.sriov-network-config-daemon-stig
  DOCKER_REGISTRY: nvcr.io/nvstaging/mellanox
  DOCKER_IMAGE_NAME: sriov-network-operator-config-daemon-stig-fips
  GOV_READY_POLICY_FILE_PATH: pulse-scan-policies/prodsec_approved_govready_release_policy.json

build-image:
  stage: build
  tags:
    - os/linux
    - type/docker
  services:
    - docker:24-dind
  rules:
    - if: '$CI_COMMIT_TAG =~ /^network-operator-.*$/'
    - if: '$CI_COMMIT_BRANCH =~ /^network-operator-.*$/'
  image: docker:24
  variables:
    DOCKER_TLS_CERTDIR: /certs
  before_script:
    # validate variables (including gitlab group scoped variables)
    - |
      for var in \
        ARTIFACTORY_USERNAME \
        ARTIFACTORY_TOKEN \
        ARTIFACTORY_REGISTRY \
        NVCR_USERNAME \
        NVCR_TOKEN \
        GOPROXY \
        GITLAB_USERNAME \
        GITLAB_TOKEN \
        GITHUB_USERNAME \
        GITHUB_TOKEN \
        STIG_SCRIPTS_REPO \
        UBUNTU_STIG_BASE_IMAGE \
        NSPECT_ID \
        SSA_CLIENT_ID_PULSE_OSS \
        SSA_CLIENT_SECRET_PULSE_OSS \
        SSA_CLIENT_ID_PULSE_STIG \
        SSA_CLIENT_SECRET_PULSE_STIG
      do
        value=$(eval "echo \$$var")
        echo "Validating variable $var..."
        if [ -n "$value" ]; then
          echo "$var=$value"
        else
          echo "ERROR: $var is empty or not set in GitLab repository settings!" >&2
          exit 1
        fi
      done
    # docker authentication
    - echo $ARTIFACTORY_TOKEN | docker login $ARTIFACTORY_REGISTRY -u $ARTIFACTORY_USERNAME --password-stdin
    - echo $NVCR_TOKEN        | docker login $DOCKER_REGISTRY      -u $NVCR_USERNAME        --password-stdin
    # determine docker tag
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        DOCKER_TAG=$CI_COMMIT_TAG-stig-fips
      else
        DOCKER_TAG=$(git rev-parse --short HEAD)  # short git commit sha
      fi
    - echo "DOCKER_TAG=$DOCKER_TAG" | tee -a build.env
    # fetch STIG FIPS scripts
    - |
      git clone \
        --depth 1 \
        --branch main \
        https://$GITLAB_USERNAME:$GITLAB_TOKEN@$STIG_SCRIPTS_REPO \
        /tmp/stig-scripts
      chmod +x /tmp/stig-scripts/*.sh
    # fetch gov-ready pulse scanner policy
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        git clone \
          --depth 1 \
          --branch main \
          https://$GITLAB_USERNAME:$GITLAB_TOKEN@gitlab-master.nvidia.com/pstooling/container-scan-policy-documents.git \
          $(dirname $GOV_READY_POLICY_FILE_PATH)
        nspect_release_version=$(echo $CI_COMMIT_TAG | grep -Eo '[0-9\.]+' | head -n 1)-fedramp  # determine nspect release version
        echo "NSPECT_RELEASE_VERSION=$nspect_release_version" | tee -a build.env
      else
        mkdir $(dirname $GOV_READY_POLICY_FILE_PATH)
        touch $GOV_READY_POLICY_FILE_PATH  # dummy file, to prevent pipeline log warning that expects to upload an artifact from this path
      fi
  script:
    # build
    - |
      docker build \
        --build-arg GOPROXY=$GOPROXY \
        --build-arg UBUNTU_STIG_BASE_IMAGE=$UBUNTU_STIG_BASE_IMAGE \
        --secret    id=stig_script,src=/tmp/stig-scripts/stig-fixer.sh \
        --file      $DOCKERFILE \
        --tag       $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG \
        .
    # push
    - docker push $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - $GOV_READY_POLICY_FILE_PATH

update-component-version-in-network-operator:
  stage: deploy
  needs:
    - job: build-image
      artifacts: true
  tags:
    - os/linux
    - type/docker
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^network-operator-.*$/'
  image: golang:1-alpine
  variables:  # additional variables defined at the gitlab group scope
    GITHUB_EMAIL: svc-cloud-orch-gh@nvidia.com
    COMPONENT_NAME: SriovConfigDaemonStigFips
    DRY_RUN: false
  before_script:
    # install packages
    - apk add --update git github-cli yq make
    # configure git
    - git config --global user.name  $GITHUB_USERNAME
    - git config --global user.email $GITHUB_EMAIL
    - gh auth setup-git
    # checkout
    - gh repo clone Mellanox/network-operator network-operator
    - cd network-operator
  script:
    # update versions in hack/release.yaml and examples
    - echo "Updating version for $COMPONENT_NAME"
    - yq -i ".$COMPONENT_NAME.version = \"$DOCKER_TAG\"" hack/release.yaml
    - make release-build
    # create CI branch if needed
    - |
      if git diff --exit-code --color=always; then
        UPDATE_BRANCH=""
      else
        UPDATE_BRANCH=ci/update-sriov-config-daemon-stig-fips-version-to-$DOCKER_TAG
        git checkout -b $UPDATE_BRANCH
      fi
    - echo "UPDATE_BRANCH=$UPDATE_BRANCH"
    # commit and push (if needed)
    - |
      if [ -n "$UPDATE_BRANCH" ]; then
        git add .
        git commit -sm "ci: update ${COMPONENT_NAME} version to $DOCKER_TAG"
        dry_run=""
        if [ "$DRY_RUN" = "true" ]; then
          dry_run="echo DRY_RUN: would have run: "
        fi
        ${dry_run}git push -u origin "$UPDATE_BRANCH"
      fi
    # create PR (if needed)
    - |
      if [ -n "$UPDATE_BRANCH" ]; then
        dry_run=""
        if [ "$DRY_RUN" = "true" ]; then
          dry_run="--dry-run"
        fi
        gh pr create $dry_run \
          --head "$UPDATE_BRANCH" \
          --base master \
          --title "ci: update ${COMPONENT_NAME} version to $DOCKER_TAG (of branch $CI_COMMIT_BRANCH)" \
          --body "Automated CI update for component '${COMPONENT_NAME}', created by internal GitLab CI for release branch $CI_COMMIT_BRANCH." \
          --reviewer e0ne --reviewer almaslennikov --reviewer rollandf --reviewer heyvister1
      fi

# Suppress component-generated track-usage jobs — they require a 'generic' runner
# tag not available in this project and block the .pre stage indefinitely.
track-template-usage:
  rules:
    - when: never

pulse-scan-oss-track-usage:
  rules:
    - when: never

# Pulse OSS scan job — generated by the scan-image component above.
# Override here to inject SSA credentials (project-specific names) and build artifacts dependency.
pulse-scan-oss:
  services: []
  needs:
    - job: build-image
      artifacts: true
  variables:
    SSA_CLIENT_ID: $SSA_CLIENT_ID_PULSE_OSS
    SSA_CLIENT_SECRET: $SSA_CLIENT_SECRET_PULSE_OSS
    PULSE_REGISTRY_NGC_PASSWORD: $NVCR_TOKEN

# Hidden template for STIG scan job using the new pulse-stig-scanner-cli image
.stig-scan-image:
  image: gitlab-master.nvidia.com:5005/pstooling/pulse-group/pulse-stig-scanner-cli:stable
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    PULSE_REGISTRY_NGC_USER: "$$oauthtoken"
  script:
    - |
      SSA_ISSUER_URL="https://x9thwm-cootr2q1jdv5p7b8iw4fs4ob3x6nqqsoznyk.ssa.nvidia.com/token?grant_type=client_credentials&scope=nspect.verify%20stigscan.anchore%20scan.anchore"
      export SSA_TOKEN=$(curl --config <(printf 'user = "%s:%s"\n' "${SSA_CLIENT_ID}" "${SSA_CLIENT_SECRET}") \
        --request POST --header "Content-Type: application/x-www-form-urlencoded" \
        "${SSA_ISSUER_URL}" --fail | jq -r ".access_token")
      mkdir -p "$HOME/.docker"
      AUTH=$(printf '%s:%s' "$PULSE_REGISTRY_NGC_USER" "$PULSE_REGISTRY_NGC_PASSWORD" | base64 | tr -d '\n')
      jq -n --arg auth "$AUTH" '{"auths":{"nvcr.io":{"auth":$auth}}}' > "$HOME/.docker/config.json"
      export REGISTRY_AUTH_FILE="$HOME/.docker/config.json"
      pulse-stig-cli scan \
        --nspect "$NSPECT_ID" \
        --image "$CONTAINER_IMAGE" \
        --program-version "$PROGRAM_VERSION"

pulse-scan-stig:
  stage: pulse-scan-stig
  extends: .stig-scan-image
  needs:
    - job: pulse-scan-oss
    - job: build-image
      artifacts: true
  tags:
    - os/linux
    - type/docker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^network-operator-.*$/'
  variables:
    SSA_CLIENT_ID: $SSA_CLIENT_ID_PULSE_STIG
    SSA_CLIENT_SECRET: $SSA_CLIENT_SECRET_PULSE_STIG
    PULSE_REGISTRY_NGC_PASSWORD: $NVCR_TOKEN
    CONTAINER_IMAGE: $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG
    NSPECT_ID: $NSPECT_ID
    PROGRAM_VERSION: $NSPECT_RELEASE_VERSION
  allow_failure:
    exit_codes: [11, 255]  # non-gating for scan/policy failures; technical errors (e.g. auth, invalid nspect id) still fail the pipeline
